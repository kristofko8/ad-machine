<!DOCTYPE html>
<html lang="sk" class="dark">
<head>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #06060a; color: #e2e8f0; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(233,77,139,0.25); border-radius: 3px; }

    .glass { background: rgba(18,18,30,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); }
    .glass-strong { background: rgba(14,14,24,0.88); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.08); }

    .gradient-text { background: linear-gradient(135deg,#f472b6,#e94d8b,#a855f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .btn-primary { background: linear-gradient(135deg,#e94d8b,#a855f7); transition: all .2s ease; }
    .btn-primary:hover { box-shadow: 0 4px 24px rgba(233,77,139,.35); transform: translateY(-1px); }
    .btn-ghost { border: 1px solid rgba(255,255,255,.1); transition: all .2s ease; }
    .btn-ghost:hover { border-color: rgba(233,77,139,.4); background: rgba(233,77,139,.06); }

    .ambient { position:fixed; inset:0; pointer-events:none; z-index:0;
      background: radial-gradient(ellipse 900px 600px at 15% 20%,rgba(233,77,139,.04),transparent),
                  radial-gradient(ellipse 600px 400px at 85% 80%,rgba(168,85,247,.03),transparent); }

    .nav-btn { display:flex; align-items:center; gap:12px; padding:10px 20px; width:100%; text-align:left;
               border-radius:0; transition: all .2s ease; cursor:pointer; background:none; border:none; }
    .nav-btn:hover { background: rgba(233,77,139,.07); }
    .nav-btn.active { background: rgba(233,77,139,.13); border-right: 2px solid #e94d8b; }
    .nav-btn.active .nav-icon { color: #e94d8b; }
    .nav-btn.active .nav-label { color: #f8fafc; font-weight: 600; }
    .nav-icon { width:18px; height:18px; color: rgba(255,255,255,.45); flex-shrink:0; }
    .nav-label { font-size:13px; color: rgba(255,255,255,.65); white-space:nowrap; overflow:hidden; transition: opacity .3s; }
    .nav-badge { margin-left:auto; font-size:10px; font-family:'JetBrains Mono',monospace; color:rgba(233,77,139,.7); background:rgba(233,77,139,.1); padding:1px 6px; border-radius:4px; }
    .nav-section { padding:6px 20px 4px; font-size:10px; font-weight:600; color:rgba(255,255,255,.25); text-transform:uppercase; letter-spacing:.1em; }

    .sidebar-collapsed .nav-label, .sidebar-collapsed .nav-badge, .sidebar-collapsed .nav-section,
    .sidebar-collapsed .logo-text { display:none !important; }
    .sidebar-collapsed .nav-btn { justify-content:center; }

    .card { background:rgba(18,18,30,.55); backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,.06); border-radius:16px; transition: all .3s cubic-bezier(.4,0,.2,1); }
    .card:hover { border-color:rgba(233,77,139,.25); box-shadow:0 8px 32px rgba(233,77,139,.08); transform:translateY(-2px); }

    .template-card { background:rgba(18,18,30,.55); backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,.06); border-radius:12px; cursor:pointer; transition: all .28s cubic-bezier(.4,0,.2,1); }
    .template-card:hover { border-color:rgba(233,77,139,.35); box-shadow:0 12px 36px rgba(233,77,139,.1); transform:translateY(-3px) scale(1.01); }
    .template-card:hover .tnum { color:#e94d8b; }

    .wizard-dot { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:all .3s ease; flex-shrink:0; }
    .wizard-dot.done { background:#e94d8b; box-shadow:0 0 14px rgba(233,77,139,.45); }
    .wizard-dot.active { background:#e94d8b; box-shadow:0 0 22px rgba(233,77,139,.6); transform:scale(1.15); }
    .wizard-dot.pending { background:rgba(255,255,255,.08); }

    .score-bar { height:6px; border-radius:3px; background:rgba(255,255,255,.06); overflow:hidden; }
    .score-fill { height:100%; border-radius:3px; transition: width 1.2s cubic-bezier(.4,0,.2,1); }

    .meta-stat { background:rgba(24,119,242,.08); border:1px solid rgba(24,119,242,.15); border-radius:10px; padding:10px 14px; }
    .meta-badge { display:inline-flex; align-items:center; gap:5px; background:rgba(24,119,242,.12); border:1px solid rgba(24,119,242,.2); color:#60a5fa; font-size:10px; font-weight:600; padding:3px 8px; border-radius:6px; }

    .input-field { width:100%; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1); border-radius:10px; padding:10px 14px; font-size:13px; color:#f1f5f9; outline:none; transition: border-color .2s; font-family:'Inter',sans-serif; }
    .input-field:focus { border-color:rgba(233,77,139,.5); background:rgba(233,77,139,.03); }
    .input-label { font-size:11px; font-weight:500; color:rgba(255,255,255,.5); margin-bottom:6px; display:block; }

    .modal-bg { position:fixed; inset:0; background:rgba(6,6,10,.82); backdrop-filter:blur(10px); z-index:200; display:flex; align-items:center; justify-content:center; padding:24px; }
    .modal-box { background:#0e0e18; border:1px solid rgba(255,255,255,.1); border-radius:20px; max-width:640px; width:100%; max-height:88vh; overflow-y:auto; box-shadow:0 40px 100px rgba(0,0,0,.6); }

    .tag { display:inline-flex; align-items:center; font-size:10px; font-weight:600; padding:3px 8px; border-radius:6px; }
    .tag-text { background:rgba(59,130,246,.1); color:#93c5fd; border:1px solid rgba(59,130,246,.2); }
    .tag-promo { background:rgba(245,158,11,.1); color:#fcd34d; border:1px solid rgba(245,158,11,.2); }
    .tag-social { background:rgba(34,197,94,.1); color:#86efac; border:1px solid rgba(34,197,94,.2); }
    .tag-info { background:rgba(6,182,212,.1); color:#67e8f9; border:1px solid rgba(6,182,212,.2); }
    .tag-comparison { background:rgba(249,115,22,.1); color:#fdba74; border:1px solid rgba(249,115,22,.2); }
    .tag-ugc { background:rgba(168,85,247,.1); color:#d8b4fe; border:1px solid rgba(168,85,247,.2); }
    .tag-lifestyle { background:rgba(236,72,153,.1); color:#f9a8d4; border:1px solid rgba(236,72,153,.2); }
    .tag-data { background:rgba(16,185,129,.1); color:#6ee7b7; border:1px solid rgba(16,185,129,.2); }

    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes ping { 0%,100%{opacity:1} 50%{opacity:.4} }

    .anim-up { animation: fadeUp .42s ease-out both; }
    .anim-in { animation: fadeIn .3s ease-out both; }
    .spin { animation: spin 1s linear infinite; }
    .ping { animation: ping 2s ease-in-out infinite; }

    .stagger > *:nth-child(1) { animation-delay:.04s; }
    .stagger > *:nth-child(2) { animation-delay:.09s; }
    .stagger > *:nth-child(3) { animation-delay:.14s; }
    .stagger > *:nth-child(4) { animation-delay:.19s; }
    .stagger > *:nth-child(5) { animation-delay:.24s; }
    .stagger > *:nth-child(6) { animation-delay:.29s; }
    .stagger > *:nth-child(7) { animation-delay:.34s; }
    .stagger > *:nth-child(8) { animation-delay:.39s; }
    .stagger > * { animation: fadeUp .42s ease-out both; }
  </style>
</head>

// ========== NAV ==========
function navigate(p) {
  page = p;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.page === p));
  const titles = {
    dashboard:['Dashboard','Prehľad vášho reklamného workflow'],
    brands:['Brandy','Správa značiek a brand DNA'],
    templates:['Šablóny','40 Motion recipe formátov'],
    studio:['Ad Studio','Vytvorte reklamu krok za krokom'],
    scores:['Scoring Agents','7 kvalitných brán — Colla Pink SK Hero #01'],
    gallery:['Galéria','Vygenerované reklamy + Meta výkon'],
    bonus:['Bonus Nástroje','Multiply, Animate, Translate'],
    'url-campaign':['URL → Kampane','Zadaj URL, vyber body a formáty — vygeneruj kampaň'],
  };
  const [t,s] = titles[p] || ['—',''];
  document.getElementById('pg-title').textContent = t;
  document.getElementById('pg-sub').textContent = s;
  const el = document.getElementById('page');
  el.className = 'p-8 anim-in';
  el.innerHTML = '';
  ({ dashboard:renderDashboard, brands:renderBrands, templates:renderTemplates, studio:renderStudio, scores:renderScores, gallery:renderGallery, bonus:renderBonus, 'url-campaign':renderUrlCampaign }[p] || renderDashboard)(el);
  updateMetaBadge();
}

function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  const sb = document.getElementById('sidebar');
  const mn = document.getElementById('main');
  const ic = document.getElementById('tog-icon');
  if (sidebarCollapsed) {
    sb.style.width = '68px'; mn.style.marginLeft = '68px'; ic.style.transform = 'rotate(180deg)';
    sb.classList.add('sidebar-collapsed');
  } else {
    sb.style.width = '256px'; mn.style.marginLeft = '256px'; ic.style.transform = '';
    sb.classList.remove('sidebar-collapsed');
  }
}

function updateMetaBadge() {
  const badge = document.getElementById('meta-status-badge');
  if (apiKeys.metaToken && apiKeys.metaAccountId) {
    badge.classList.remove('hidden'); badge.classList.add('flex');
  } else {
    badge.classList.add('hidden'); badge.classList.remove('flex');
  }
}

function filterTpl() {
  const cf = document.getElementById('cf');
  const df = document.getElementById('df');
  const cat = cf ? cf.value : '';
  const diff = df ? df.value : '';
  document.querySelectorAll('.template-card').forEach(c => {
    const ok = (!cat || c.dataset.cat === cat) && (!diff || c.dataset.diff === diff);
    c.style.display = ok ? '' : 'none';
  });
}

function setTplCat(c) {
  const el = document.getElementById('cf');
  if (el) { el.value = c; filterTpl(); }
}

               <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069z"/></svg>
               Pripojiť Meta API
             </button>`}
        <button class="btn-ghost px-3 py-1.5 rounded-lg text-[11px] text-white/45 flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          Stiahnuť všetky
        </button>
        <button onclick="navigate('studio')" class="btn-primary px-4 py-1.5 rounded-lg text-[11px] font-semibold text-white flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Nová reklama
        </button>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-5 mb-7">
      ${ads.map(a => galleryCard(a, hasMetaKeys)).join('')}
    </div>

    <!-- Meta performance overview table (if synced) -->
    ${ads.some(a=>a.meta) ? `
    <div class="card p-6 mb-6">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
          <svg class="w-4 h-4 text-blue-400" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069z"/></svg>
          <p class="text-[13px] font-semibold text-white">Meta Ads Výkon</p>
        </div>
        <span class="text-[10px] text-white/35">Synced: 2024-04-29 14:32</span>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead><tr class="border-b border-white/6">
            ${['Reklama','Impressions','Reach','Clicks','CTR','CPC','CPM','Spend','ROAS'].map(h=>`<th class="text-[10px] font-semibold text-white/35 uppercase tracking-wider text-left py-2 pr-4">${h}</th>`).join('')}
          </tr></thead>
          <tbody>
            ${ads.filter(a=>a.meta).map(a=>`<tr class="border-b border-white/4 hover:bg-white/3 transition-colors">
              <td class="py-3 pr-4"><p class="text-[12px] font-medium text-white whitespace-nowrap">${a.name}</p><p class="text-[10px] text-white/35">${a.template}</p></td>
              <td class="py-3 pr-4 text-[12px] font-mono text-white/70">${a.meta.impressions.toLocaleString()}</td>
              <td class="py-3 pr-4 text-[12px] font-mono text-white/70">${a.meta.reach.toLocaleString()}</td>
              <td class="py-3 pr-4 text-[12px] font-mono text-white/70">${a.meta.clicks.toLocaleString()}</td>
              <td class="py-3 pr-4 text-[12px] font-bold font-mono ${a.meta.ctr>3?'text-emerald-400':a.meta.ctr>2?'text-amber-400':'text-white/60'}">${a.meta.ctr}%</td>
              <td class="py-3 pr-4 text-[12px] font-mono text-white/70">$${a.meta.cpc}</td>
              <td class="py-3 pr-4 text-[12px] font-mono text-white/70">$${a.meta.cpm}</td>
              <td class="py-3 pr-4 text-[12px] font-bold font-mono text-white">$${a.meta.spend}</td>
              <td class="py-3 pr-4 text-[13px] font-bold font-mono ${a.meta.roas>=4?'text-emerald-400':a.meta.roas>=2?'text-amber-400':'text-red-400'}">${a.meta.roas}x</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>` : ''}

    <!-- Generation log -->
    <div class="card p-5">
      <p class="text-[12px] font-semibold text-white mb-3">Generovanie log</p>
      <div class="space-y-1.5 font-mono text-[11px]">
        ${[
          ['14:32:01','emerald','✓','Hero — Scoring passed (avg 94.0, všetky ≥90)'],
          ['14:32:15','emerald','✓','Hero — Prompt substitution (0 placeholderov)'],
          ['14:32:18','blue','→','Hero — Odosielanie na FAL AI (nano-banana-2, 1080×1080)'],
          ['14:32:24','emerald','✓','Hero — Obrázok vygenerovaný ($0.06, 6.2s)'],
          ['14:32:41','emerald','✓','Hero — Meta výkon synchronizovaný (Act: act_123...)'],
          ['14:33:05','amber','●','UGC Story — Scoring prebieha...'],
        ].map(([t,c,ic,msg])=>`
          <div class="flex items-start gap-3 text-white/40">
            <span class="text-white/20 flex-shrink-0">${t}</span>
            <span class="text-${c}-400 flex-shrink-0 ${c==='amber'?'ping':''}">${ic}</span>

          </div>`).join('')}
      </div>
    </div>
  `;
}

function galleryCard(ad, hasMetaKeys) {
  const sMap = {
    completed:{label:'Hotovo',cls:'text-emerald-400 bg-emerald-400/10'},
    generating:{label:'Generuje sa',cls:'text-blue-400 bg-blue-400/10'},
    pending:{label:'Čaká',cls:'text-white/30 bg-white/5'},
  };
  const s = sMap[ad.status];
  const previewH = ad.ratio==='9:16' ? 'aspect-[9/14]' : ad.ratio==='4:5' ? 'aspect-[4/4]' : 'aspect-square';

  return `<div class="card overflow-hidden cursor-pointer" onclick="openAdDetail('${ad.id}')">
    <!-- Preview -->
    <div class="relative overflow-hidden flex items-center justify-center" style="background:${ad.preview};aspect-ratio:1">
      ${ad.status==='completed' && ad.previewText ? `
        <div class="text-center px-4">
          <div class="text-[22px] font-black text-white/85 tracking-tight leading-tight mb-2" style="text-shadow:0 2px 12px rgba(0,0,0,.35)">${ad.copy.headline}</div>
          <div class="inline-block bg-white/90 text-pink-600 text-[10px] font-bold px-3 py-1 rounded-full">${ad.copy.cta}</div>
          <div class="flex justify-center gap-1.5 mt-2">
            ${[ad.copy.stat1,ad.copy.stat2,ad.copy.stat3].map(s=>`<span class="text-[8px] font-bold text-white/85 bg-white/18 px-1.5 py-0.5 rounded-full backdrop-blur-sm">${s}</span>`).join('')}
          </div>
        </div>
      ` : ad.status==='generating' ? `
        <div class="flex flex-col items-center gap-2">
          <div class="w-8 h-8 border-2 border-white/25 border-t-white rounded-full spin"></div>
          <p class="text-[11px] text-white/55">Generuje sa...</p>
        </div>
      ` : `
        <div class="flex flex-col items-center gap-2 opacity-30">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          <p class="text-[11px] text-white">Čaká na generovanie</p>
        </div>
      `}
      ${ad.scoring ? `<div class="absolute top-2 right-2 bg-black/60 backdrop-blur-sm text-emerald-400 text-[10px] font-bold font-mono px-2 py-0.5 rounded-full">${ad.scoring.avg}</div>` : ''}
    </div>

    <!-- Info -->
    <div class="p-4">
      <div class="flex items-start justify-between mb-2">
        <div>
          <p class="text-[12px] font-semibold text-white leading-snug">${ad.name}</p>
          <p class="text-[10px] text-white/40 mt-0.5">${ad.template}</p>
        </div>
        <span class="text-[10px] font-medium px-2 py-0.5 rounded-full flex-shrink-0 ml-2 ${s.cls}">${s.label}</span>
      </div>

      <div class="flex items-center gap-1.5 mb-3">
        <span class="text-[9px] text-white/30 bg-white/5 px-1.5 py-0.5 rounded">${ad.ratio}</span>
        <span class="text-[9px] text-white/30 bg-white/5 px-1.5 py-0.5 rounded">${ad.resolution}</span>
        ${ad.metaAdId ? `<span class="text-[9px] text-blue-400/60 bg-blue-500/8 px-1.5 py-0.5 rounded font-mono">Meta ID</span>` : ''}
      </div>

      <!-- Meta stats if available -->
      ${ad.meta ? `
        <div class="grid grid-cols-4 gap-1.5 pt-3" style="border-top:1px solid rgba(255,255,255,.05)">
          ${[['CTR',ad.meta.ctr+'%','text-emerald-400'],['CPC','$'+ad.meta.cpc,''],['Spend','$'+ad.meta.spend,''],['ROAS',ad.meta.roas+'x','text-emerald-400']].map(([l,v,c])=>`
            <div class="text-center">
              <p class="text-[9px] text-white/30 uppercase tracking-wider">${l}</p>
              <p class="text-[11px] font-bold font-mono mt-0.5 ${c||'text-white/70'}">${v}</p>
            </div>`).join('')}
        </div>
      ` : hasMetaKeys && ad.metaAdId ? `
        <button onclick="event.stopPropagation(); syncAdMeta('${ad.id}')" class="w-full text-center text-[10px] text-blue-400/60 hover:text-blue-400 transition-colors py-1 mt-2" style="border-top:1px solid rgba(255,255,255,.05)">
          Sync Meta výkon →
        </button>
      ` : !ad.metaAdId ? `
        <p class="text-[10px] text-white/25 mt-2 text-center" style="border-top:1px solid rgba(255,255,255,.05);padding-top:8px">Zadaj Meta Ad ID v Studio</p>
      ` : ''}
    </div>
  </div>`;
}

function openAdDetail(id) {
  const ad = ads.find(a=>a.id===id);
  if (!ad) return;
  openModal(`
    <div class="flex items-start justify-between mb-6">
      <div>
        <h2 class="text-[18px] font-bold text-white">${ad.name}</h2>
        <p class="text-[12px] text-white/40 mt-0.5">${ad.template} · ${ad.ratio} · ${ad.resolution}</p>
      </div>
      <button onclick="closeModal()" class="text-white/30 hover:text-white/60 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white/5 transition-colors flex-shrink-0">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Preview mini -->
    <div class="w-full h-40 rounded-xl mb-5 flex items-center justify-center" style="background:${ad.preview}">
      ${ad.previewText ? `<div class="text-center"><div class="text-[18px] font-black text-white/85 leading-tight">${ad.copy.headline}</div></div>` : `<p class="text-white/40 text-[12px]">${ad.status==='generating'?'Generuje sa...':'Čaká na generovanie'}</p>`}
    </div>

    <!-- Copy -->
    <div style="background:rgba(255,255,255,.04);border-radius:12px;padding:16px;margin-bottom:16px">
      <p class="text-[10px] font-semibold text-white/35 uppercase tracking-wider mb-3">Copy</p>
      <div class="space-y-2">
        ${Object.entries(ad.copy).map(([k,v])=>`<div class="flex gap-2"><span class="text-[10px] text-white/35 w-16 flex-shrink-0 capitalize pt-0.5">${k}</span><span class="text-[12px] font-semibold text-white">${v}</span></div>`).join('')}
      </div>
    </div>

    <!-- Meta ID -->
    <div style="background:rgba(24,119,242,.06);border:1px solid rgba(24,119,242,.15);border-radius:12px;padding:16px;margin-bottom:16px">
      <p class="text-[10px] font-semibold text-blue-400/70 uppercase tracking-wider mb-2">Meta Ad ID</p>
      ${ad.metaAdId
        ? `<p class="text-[13px] font-mono text-white">${ad.metaAdId}</p>`
        : `<p class="text-[12px] text-white/35 italic">Nezadaný — pridaj v Ad Studio</p>`}
    </div>

    <!-- Meta performance -->
    ${ad.meta ? `
      <div style="background:rgba(24,119,242,.06);border:1px solid rgba(24,119,242,.15);border-radius:12px;padding:16px;margin-bottom:16px">
        <div class="flex items-center justify-between mb-3">
          <p class="text-[10px] font-semibold text-blue-400/70 uppercase tracking-wider">Meta Výkon</p>
          <span class="text-[10px] text-white/30">Synced: ${ad.meta.synced}</span>
        </div>
        <div class="grid grid-cols-4 gap-2">
          ${[['Impressions',ad.meta.impressions.toLocaleString(),''],['Reach',ad.meta.reach.toLocaleString(),''],['Clicks',ad.meta.clicks.toLocaleString(),''],['CTR',ad.meta.ctr+'%','text-emerald-400'],['CPC','$'+ad.meta.cpc,''],['CPM','$'+ad.meta.cpm,''],['Spend','$'+ad.meta.spend,''],['ROAS',ad.meta.roas+'x','text-emerald-400']].map(([l,v,c])=>`
            <div class="meta-stat text-center">
              <p class="text-[9px] text-white/35 uppercase tracking-wider">${l}</p>
              <p class="text-[14px] font-bold font-mono mt-0.5 ${c||'text-white/80'}">${v}</p>
            </div>`).join('')}
        </div>
      </div>
    ` : `
      <div class="text-center py-4 mb-4">
        <p class="text-[12px] text-white/35">Meta výkon ešte nie je synchronizovaný.</p>
        ${ad.metaAdId ? `<button onclick="syncAdMeta('${ad.id}'); closeModal()" class="mt-2 text-[11px] text-blue-400 hover:underline">Sync teraz →</button>` : `<p class="text-[11px] text-white/25 mt-1">Zadaj Meta Ad ID v Ad Studio.</p>`}
      </div>
    `}

    ${ad.scoring ? `
      <div class="grid grid-cols-3 gap-2">
        ${Object.entries(ad.scoring).filter(([k])=>k!=='avg').map(([k,v])=>`
          <div style="background:rgba(255,255,255,.04);border-radius:8px;padding:10px" class="text-center">
            <p class="text-[9px] text-white/35 mb-0.5">Agent ${k.replace(/[^0-9]/g,'')}</p>
            <p class="text-[14px] font-bold font-mono ${v==='PASS'?'text-emerald-400':Number(v)>=95?'text-emerald-400':Number(v)>=90?'text-green-400':'text-amber-400'}">${v}</p>
          </div>`).join('')}
      </div>
    ` : ''}
  `);
}

function syncAllMeta() {
  showToast('Synchronizujem Meta výkon pre všetky reklamy...');
  setTimeout(() => { showToast('Meta výkon synchronizovaný ✓'); }, 1800);
}

function syncAdMeta(id) {
  showToast(`Synchronizujem Meta výkon pre ${ads.find(a=>a.id===id)?.name}...`);
}

// ========== INIT ==========
updateMetaBadge();
navigate('dashboard');
</script>
